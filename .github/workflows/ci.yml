name: CI

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set image tag
        run: echo "TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build backend
        run: docker build -t nguyendai/mern-backend:${{ env.TAG }} ./backend

      - name: Build frontend
        run: docker build -t nguyendai/mern-frontend:${{ env.TAG }} ./frontend

      - name: Push images
        run: |
          docker push nguyendai/mern-backend:${{ env.TAG }}
          docker push nguyendai/mern-frontend:${{ env.TAG }}

      - name: Also tag latest (optional)
        run: |
          docker tag nguyendai/mern-backend:${{ env.TAG }} nguyendai/mern-backend:latest
          docker tag nguyendai/mern-frontend:${{ env.TAG }} nguyendai/mern-frontend:latest
          docker push nguyendai/mern-backend:latest
          docker push nguyendai/mern-frontend:latest

      - name: Trigger Jenkins Deploy
        run: |
          CRUMB=$(curl -u ${{ secrets.JENKINS_USER }}:${{ secrets.JENKINS_API_TOKEN }} \
            http://52.221.219.52:8080/crumbIssuer/api/xml?xpath=concat(//crumbRequestField,":",//crumb))

          curl -X POST "http://52.221.219.52:8080/job/deploy/buildWithParameters?token=deploy-token&IMAGE_TAG=${{ env.TAG }}" \
            -u ${{ secrets.JENKINS_USER }}:${{ secrets.JENKINS_API_TOKEN }} \
            -H "$CRUMB"