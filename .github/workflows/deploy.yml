name: CI/CD 

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build backend
        run: docker build -t nguyendai/mern-backend ./backend

      - name: Build frontend
        run: docker build -t nguyendai/mern-frontend ./frontend

      - name: Push images
        run: |
          docker push nguyendai/mern-backend
          docker push nguyendai/mern-frontend