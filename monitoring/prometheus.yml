global:
  scrape_interval: 5s

rule_files:
  - "alert.rules.yml"

scrape_configs:
  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: 'mongo'
    static_configs:
      - targets: ['mongo-exporter:9216']

  - job_name: 'backend'
    static_configs:
      - targets: ['backend:8001']

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']

