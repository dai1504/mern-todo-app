groups:
- name: system-alerts
  rules:

  - alert: HighCPUUsage
    expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[1m])) * 100) > 80
    for: 1m
    labels:
      severity: warning
    annotations:
      summary: "High CPU usage detected"

  - alert: MongoDown
    expr: up{job="mongo"} == 0
    for: 1m
    labels:
      severity: critical
    annotations:
      summary: "MongoDB is down"

  - alert: BackendDown
    expr: up{job="backend"} == 0
    for: 1m
    labels:
      severity: critical
    annotations:
      summary: "Backend is down"