

services:
  mongo:
    image: mongo:6
    volumes:
      - mongo_data:/data/db
    restart: always

  backend:
    image: nguyendai/mern-backend:latest
    env_file:
      - ./backend/.env
    depends_on:
      - mongo
    restart: always
    networks:
      - app-network

  frontend:
    image: nguyendai/mern-frontend:latest
    restart: always
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "80:80"
    depends_on:
      - frontend
      - backend
    restart: always
    networks:
      - app-network

  prometheus:
    image: prom/prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./monitoring/alert.rules.yml:/etc/prometheus/alert.rules.yml
    ports:
      - "9090:9090"
    restart: always
    networks:
      - app-network

  grafana:
    image: grafana/grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    restart: always
    networks:
      - app-network

  node-exporter:
    image: prom/node-exporter
    restart: always
    networks:
      - app-network
  
  mongo-exporter:
    image: bitnami/mongodb-exporter:latest
    environment:
      - MONGODB_URI=mongodb://mongo:27017/todo
    restart: always
    networks:
      - app-network


volumes:
  mongo_data:

networks:
  app-network: